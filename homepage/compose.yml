services:
  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    environment:
      PUID: 1000
      PGID: 1000
    env_file:
      - .env
    ports:
      - 3000:3000
    volumes:
      - ./config:/app/config:ro
      - ./icons:/app/public/icons:ro
      - /srv/homepage/logs:/app/config/logs
    restart: unless-stopped
