services:
  atuin:
    container_name: atuin
    image: ghcr.io/atuinsh/atuin:42dd242
    restart: unless-stopped
    ports:
      - 8888:8888
    environment:
      ATUIN_HOST: 0.0.0.0
      ATUIN_OPEN_REGISTRATION: false
      ATUIN_DB_URI: postgres://${POSTGRES_USER?}:${POSTGRES_PASSWORD?}@db/$>
      RUST_LOG: info,atuin_server=debug
    volumes:
      - /srv/atuin/config:/config
    user: 1000:990
    command: start
    depends_on:
      - db
  db:
    container_name: db
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?}
      POSTGRES_DB: ${POSTGRES_DB?}
    volumes:
      - /srv/atuin/database:/var/lib/postgresql/data
