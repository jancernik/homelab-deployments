hosts:
  - name: cloudflare
    address: ${CLOUDFLARE_ADDRESS}
    deploy_dir: /opt/apps

  - name: pangolin
    address: ${PANGOLIN_ADDRESS}
    deploy_dir: /opt/apps

  - name: nginxproxymanager
    address: ${NPM_ADDRESS}
    deploy_dir: /opt/apps

  - name: atuin
    address: ${ATUIN_ADDRESS}
    deploy_dir: /opt/apps

  - name: syncthing
    address: ${SYNCTHING_ADDRESS}
    deploy_dir: /opt/apps

  - name: immich
    address: ${IMMICH_ADDRESS}
    deploy_dir: /opt/apps

  - name: ai
    address: ${AI_ADDRESS}
    deploy_dir: /opt/apps

  - name: frigate
    address: ${FRIGATE_ADDRESS}
    deploy_dir: /opt/apps

  - name: media-stack
    address: ${MEDIA_STACK_ADDRESS}
    deploy_dir: /opt/apps

  - name: jenkins
    address: ${JENKINS_ADDRESS}
    deploy_dir: /opt/apps

repos:
  - name: homelab-deployments
    url: git@github.com:jancernik/homelab-deployments.git
    trigger_mode: hybrid
    poll_interval: 60s

projects:
  - name: cloudflare
    repo: homelab-deployments
    repo_subdir: cloudflare
    targets:
      - cloudflare

  - name: pangolin
    repo: homelab-deployments
    repo_subdir: pangolin
    targets:
      - pangolin

  - name: nginxproxymanager
    repo: homelab-deployments
    repo_subdir: nginxproxymanager
    targets:
      - nginxproxymanager

  - name: openwebui
    repo: homelab-deployments
    repo_subdir: openwebui
    targets:
      - ai

  - name: atuin
    repo: homelab-deployments
    repo_subdir: atuin
    targets:
      - atuin

  - name: syncthing
    repo: homelab-deployments
    repo_subdir: syncthing
    targets:
      - syncthing

  - name: immich
    repo: homelab-deployments
    repo_subdir: immich
    targets:
      - immich

  - name: wyoming
    repo: homelab-deployments
    repo_subdir: wyoming
    targets:
      - ai

  - name: media-stack
    repo: homelab-deployments
    repo_subdir: media-stack
    targets:
      - media-stack

  - name: frigate
    repo: homelab-deployments
    repo_subdir: frigate
    targets:
      - frigate
    extra_files:
      - config.yml

  - name: jenkins
    repo: homelab-deployments
    repo_subdir: jenkins
    targets:
      - jenkins
